services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emuworld
      POSTGRES_USER: emuworld
      POSTGRES_PASSWORD: emuworld_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emuworld"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://emuworld:emuworld_pass@postgres:5432/emuworld
      AI_SERVICE_URL: http://ai-service:9000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:

  ai-service:
    build: ./ai-service
    ports:
      - "9000:9000"

volumes:
  pgdata:
